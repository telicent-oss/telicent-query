name: Lint Helm Charts
run-name: Lint Helm Charts

on:
  push:
    branches-ignore:
      - main
    paths:
      - charts/**

# Revoke almost all permissions by default and grant only those needed to each job.
# https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax#permissions
permissions:
  contents: read

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.setup-matrix.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          sparse-checkout: charts
      - name: Setup matrix
        id: setup-matrix
        shell: python
        run: |
          from pathlib import Path
          import json
          import os

          charts = []

          p = Path('charts')
          for file in p.rglob('Chart.yaml'):
              charts.append(file.parent.as_posix())

          matrix = { 'chart': charts }
          print(json.dumps(matrix, indent=4))
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'matrix={json.dumps(matrix, separators=(',', ':'))}\n')

  lint-helm-charts:
    name: Lint Helm charts
    runs-on: ubuntu-latest
    needs: prepare
    strategy: 
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix ) }}
    steps:
      - name: Lint charts
        uses: telicent-oss/shared-workflows/.github/actions/lint-helm-charts@main
        with:
          chart: ${{ matrix.chart }}
